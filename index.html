<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- 1. Notch & iOS Support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- 2. Font Preload -->
    <link rel="preload" href="/fonts/InterVariable.ttf" as="font" type="font/ttf" crossorigin />

    <title>FitTrack</title>

    <!-- 3. Critical Inline Script: Prevent Theme Flash -->
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('fittrack-settings-storage');
          let theme = 'system';
          
          if (savedTheme) {
            const parsed = JSON.parse(savedTheme);
            theme = parsed.state.theme || 'system';
          }

          const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          console.error('Theme initialization failed', e);
        }
      })();
    </script>

    <!-- 4. Prevent Background Flash -->
    <style>
      :root {
        --bg-light: #ffffff;
        --bg-dark: #09090b; /* matches shadcn zinc-950 */
      }
      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-light);
      }
      html.dark, html.dark body {
        background-color: var(--bg-dark);
      }
      #root {
        height: 100dvh;
        width: 100%;
        position: fixed;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
